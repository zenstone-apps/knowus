<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KnowUs — Join Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; background: #0D1F2D; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white; text-align: center; padding: 20px; box-sizing: border-box; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .code { font-size: 3rem; font-weight: 900; color: #E8604C; letter-spacing: 8px; margin: 20px 0; }
    p { color: rgba(255,255,255,0.6); line-height: 1.6; }
    .btn { display: inline-block; margin-top: 16px; padding: 14px 28px; border-radius: 14px; color: white; font-weight: 800; text-decoration: none; font-size: 1rem; }
    .btn-open { background: #E8604C; }
    .btn-ios { background: #333; margin-right: 8px; }
    .btn-android { background: #1a73e8; }
    .store-btns { margin-top: 24px; }
  </style>
  <script>
    var code = window.location.pathname.split('/').pop();
    function tryOpen() {
      var deepLink = 'knowus://join/' + code;
      window.location = deepLink;
      setTimeout(function() {
        var ua = navigator.userAgent;
        if (/android/i.test(ua)) {
          window.location = 'https://play.google.com/store/apps/details?id=com.knowus.game';
        } else if (/iphone|ipad|ipod/i.test(ua)) {
          window.location = 'https://apps.apple.com/app/knowus/id6744237249';
        }
      }, 1500);
    }
    window.onload = function() {
      document.getElementById('code').textContent = code;
      tryOpen();
    };
  </script>
</head>
<body>
  <div>
    <h1>🎮 KnowUs</h1>
    <p>Du wurdest eingeladen! Code:</p>
    <div class="code" id="code"></div>
    <p>Öffne die App und gib den Code ein,<br>oder lade KnowUs jetzt herunter:</p>
    <div class="store-btns">
      <a class="btn btn-ios" href="https://apps.apple.com/app/knowus/id6744237249">App Store</a>
      <a class="btn btn-android" href="https://play.google.com/store/apps/details?id=com.knowus.game">Play Store</a>
    </div>
  </div>
</body>
</html>
